<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogs by Amna — Authentically Amna</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ══════════════════════════════
   THEME TOKENS
══════════════════════════════ */
[data-theme="light"]{
  --bg:#F7F0E6;
  --bg2:#EDE4D6;
  --bg3:#E4D8C8;
  --ink:#0D0F1A;
  --ink2:rgba(13,15,26,0.65);
  --ink3:rgba(13,15,26,0.4);
  --rose:#C4788A;
  --rose-glow:rgba(196,120,138,0.25);
  --gold:#D4A853;
  --sage:#8FA68E;
  --violet:#7B5EA7;
  --violet-soft:#9b7ec8;
  --glass:rgba(13,15,26,0.05);
  --glass-border:rgba(13,15,26,0.1);
  --card-bg:rgba(255,255,255,0.6);
  --nav-bg:rgba(247,240,230,0.88);
  --modal-bg:rgba(247,240,230,0.99);
  --shadow:rgba(13,15,26,0.12);
  --particle1:#C4788A;
  --particle2:#7B5EA7;
  --particle3:#D4A853;
  --particle4:#8FA68E;
}
[data-theme="dark"]{
  --bg:#080610;
  --bg2:#0F0A1E;
  --bg3:#160F28;
  --ink:#F0EEFF;
  --ink2:rgba(240,238,255,0.65);
  --ink3:rgba(240,238,255,0.35);
  --rose:#E8849A;
  --rose-glow:rgba(232,132,154,0.25);
  --gold:#E8C060;
  --sage:#9ABFA0;
  --violet:#9B7ED4;
  --violet-soft:#b99de8;
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.09);
  --card-bg:rgba(255,255,255,0.04);
  --nav-bg:rgba(8,6,16,0.88);
  --modal-bg:rgba(15,10,30,0.99);
  --shadow:rgba(0,0,0,0.4);
  --particle1:#E8849A;
  --particle2:#9B7ED4;
  --particle3:#E8C060;
  --particle4:#9ABFA0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--ink);
  overflow-x:hidden;width:100%;
  transition:background 0.6s ease,color 0.6s ease;
}

/* cursor removed */

/* ══════════════════════════════
   PAGE TRANSITION WIPE
══════════════════════════════ */
.wipe-overlay{
  position:fixed;inset:0;z-index:8000;pointer-events:none;
  display:flex;
}
.wipe-panel{
  flex:1;background:var(--rose);
  transform:scaleY(0);transform-origin:bottom;
  transition:transform 0.5s cubic-bezier(.76,0,.24,1);
}
.wipe-panel:nth-child(2){background:var(--gold);transition-delay:0.05s}
.wipe-panel:nth-child(3){background:var(--violet);transition-delay:0.1s}
.wipe-overlay.in .wipe-panel{transform:scaleY(1)}
.wipe-overlay.out .wipe-panel{transform:scaleY(0);transform-origin:top}

/* ══════════════════════════════
   READING PROGRESS BAR
══════════════════════════════ */
.progress-bar{
  position:fixed;top:0;left:0;height:3px;width:0%;
  background:linear-gradient(90deg,var(--rose),var(--gold),var(--violet));
  z-index:9000;transition:width 0.1s linear;
  display:none;
  box-shadow:0 0 8px var(--rose-glow);
}
.progress-bar.active{display:block}

/* ══════════════════════════════
   NAV
══════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 3.5rem;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  transition:background 0.6s,border-color 0.6s;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:900;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;white-space:nowrap;
}
.nav-right{display:flex;align-items:center;gap:2rem}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{
  font-family:'Space Grotesk',sans-serif;
  font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink2);text-decoration:none;position:relative;transition:color 0.3s;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
  background:var(--rose);transform:scaleX(0);transform-origin:left;transition:transform 0.3s;
}
.nav-links a:hover{color:var(--rose)}
.nav-links a:hover::after{transform:scaleX(1)}

/* theme toggle */
.theme-toggle{
  width:44px;height:24px;border-radius:100px;
  background:var(--glass-border);border:1px solid var(--glass-border);
  cursor:pointer;position:relative;transition:background 0.4s;
  flex-shrink:0;
}
.theme-toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--rose);
  transition:transform 0.4s cubic-bezier(.34,1.56,.64,1),background 0.4s;
}
[data-theme="dark"] .theme-toggle::after{transform:translateX(20px);background:var(--gold)}
.toggle-icon{
  position:absolute;top:50%;
  font-size:0.6rem;pointer-events:none;
  transition:opacity 0.3s;
}
.toggle-icon.sun{left:5px;transform:translateY(-50%);opacity:1}
.toggle-icon.moon{right:4px;transform:translateY(-50%);opacity:0.5}
[data-theme="dark"] .toggle-icon.sun{opacity:0.5}
[data-theme="dark"] .toggle-icon.moon{opacity:1}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--ink);transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.mobile-menu{
  display:none;position:fixed;top:57px;left:0;right:0;
  background:var(--nav-bg);backdrop-filter:blur(20px);
  z-index:299;flex-direction:column;padding:1.5rem 2rem 2rem;
  border-bottom:1px solid var(--glass-border);gap:1.2rem;
}
.mobile-menu.open{display:flex}
.mobile-menu a{
  font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);
  text-decoration:none;padding:0.5rem 0;border-bottom:1px solid var(--glass-border);transition:color 0.3s;
}
.mobile-menu a:hover{color:var(--rose)}

/* ══════════════════════════════
   HERO
══════════════════════════════ */
.hero{
  position:relative;min-height:100vh;width:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;z-index:1;
}
#particles{position:absolute;inset:0;z-index:0;pointer-events:none}

.grid-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--glass-border) 1px,transparent 1px),
    linear-gradient(90deg,var(--glass-border) 1px,transparent 1px);
  background-size:70px 70px;
  transform:perspective(900px) rotateX(18deg);transform-origin:bottom;
  pointer-events:none;opacity:0.6;
}

.hero-orb{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:conic-gradient(from 0deg,var(--violet),var(--rose),var(--gold),var(--sage),var(--violet));
  filter:blur(90px);opacity:0.12;
  animation:orbSpin 24s linear infinite;pointer-events:none;
}
@keyframes orbSpin{from{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}to{transform:rotate(360deg) scale(1)}}

.hero-content{
  position:relative;z-index:2;
  display:grid;grid-template-columns:1fr 1fr;
  gap:4rem;align-items:center;
  max-width:1200px;width:100%;padding:7rem 3rem 4rem;
}

/* INK BLEED text reveal */
.hero-badge{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.4rem 1rem;border:1px solid var(--rose-glow);border-radius:100px;
  font-family:'Space Grotesk',sans-serif;font-size:0.68rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--rose);
  background:var(--rose-glow);margin-bottom:1.5rem;
  opacity:0;animation:inkReveal 1s ease 0.3s forwards;
}
.hero-badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--rose);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--rose-glow)}50%{box-shadow:0 0 0 6px transparent}}

/* the ink bleed title */
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(3rem,5.5vw,5.8rem);
  font-weight:900;line-height:1.1;
  display:flex;flex-direction:column;
}
.ink-word{
  display:block;
  opacity:0;
  filter:blur(12px);
  transform:translateY(20px) scale(0.95);
  animation:inkBleed 1.2s cubic-bezier(.16,1,.3,1) forwards;
}
.ink-word:nth-child(1){animation-delay:0.5s}
.ink-word:nth-child(2){animation-delay:0.75s;font-style:italic;font-weight:400}
@keyframes inkBleed{
  0%{opacity:0;filter:blur(16px);transform:translateY(24px) scale(0.93)}
  60%{opacity:1;filter:blur(2px);transform:translateY(-3px) scale(1.01)}
  100%{opacity:1;filter:blur(0);transform:translateY(0) scale(1)}
}

.hero-gradient-text{
  background:linear-gradient(90deg,var(--rose) 0%,var(--gold) 50%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:200% auto;animation:gradShift 4s linear infinite;
}
@keyframes gradShift{0%{background-position:0% center}100%{background-position:200% center}}

.hero-sub{
  margin-top:1.6rem;font-size:1.05rem;line-height:1.85;
  color:var(--ink2);max-width:440px;
  opacity:0;animation:inkReveal 1s ease 1.2s forwards;
}
@keyframes inkReveal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.hero-cta{
  margin-top:2.5rem;display:flex;gap:1rem;flex-wrap:wrap;
  opacity:0;animation:inkReveal 1s ease 1.5s forwards;
}
.btn-glow{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.9rem 2rem;border:none;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:0.82rem;
  font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  text-decoration:none;border-radius:6px;
  background:linear-gradient(135deg,var(--rose),var(--violet));
  color:white;position:relative;overflow:hidden;
  transition:transform 0.3s,box-shadow 0.3s;
  box-shadow:0 4px 20px var(--rose-glow);
}
.btn-glow::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  opacity:0;transition:opacity 0.3s;
}
.btn-glow:hover{transform:translateY(-3px);box-shadow:0 8px 30px var(--rose-glow)}
.btn-glow:hover::before{opacity:1}
.btn-glow span{position:relative;z-index:1}
.btn-outline{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.9rem 2rem;border:1px solid var(--glass-border);cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:0.82rem;
  font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  text-decoration:none;border-radius:6px;
  color:var(--ink);background:var(--glass);
  transition:all 0.3s;backdrop-filter:blur(10px);
}
.btn-outline:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-glow)}

/* floating 3D card */
.hero-right{display:flex;justify-content:center;align-items:center;opacity:0;animation:inkReveal 1s ease 1.8s forwards}
.hero-3d-card{
  width:100%;max-width:360px;
  background:var(--card-bg);
  border:1px solid var(--glass-border);
  border-radius:20px;padding:2.5rem;
  backdrop-filter:blur(24px);
  transform:perspective(800px) rotateY(-8deg) rotateX(4deg);
  animation:float3d 7s ease-in-out infinite;
  position:relative;overflow:hidden;
  box-shadow:0 0 0 1px var(--glass-border),24px 24px 60px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.15);
  transition:background 0.6s,border-color 0.6s;
}
@keyframes float3d{
  0%,100%{transform:perspective(800px) rotateY(-8deg) rotateX(4deg) translateY(0)}
  33%{transform:perspective(800px) rotateY(-5deg) rotateX(2deg) translateY(-14px)}
  66%{transform:perspective(800px) rotateY(-11deg) rotateX(6deg) translateY(-7px)}
}
.card-glow-orb{
  position:absolute;bottom:-50px;right:-50px;
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,var(--rose-glow),transparent 70%);
  pointer-events:none;
}
.card-tag{
  font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--rose);
  margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;
}
.card-tag::before{content:'';width:20px;height:1px;background:var(--rose)}
.card-quote{
  font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;
  font-weight:400;line-height:1.65;color:var(--ink);margin-bottom:1.5rem;
  position:relative;z-index:1;
}
.card-author{
  font-family:'Space Grotesk',sans-serif;font-size:0.72rem;
  font-weight:700;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase;
}

/* parallax layer */
.parallax-slow{will-change:transform}
.parallax-fast{will-change:transform}

/* ══════════════════════════════
   MARQUEE
══════════════════════════════ */
.marquee-wrap{
  position:relative;z-index:10;overflow:hidden;padding:0.8rem 0;
  background:linear-gradient(90deg,var(--rose),var(--violet),var(--gold),var(--rose));
  background-size:300% auto;animation:gradShift 8s linear infinite;
}
.marquee-track{display:flex;white-space:nowrap;animation:marquee 32s linear infinite}
.marquee-item{
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;color:white;
  padding:0 1.5rem;flex-shrink:0;
}
.marquee-sep{color:rgba(255,255,255,0.45);padding:0 0.3rem;flex-shrink:0}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ══════════════════════════════
   SVG WAVE DIVIDER
══════════════════════════════ */
.wave-divider{display:block;width:100%;overflow:hidden;line-height:0;position:relative;z-index:5}
.wave-divider svg{display:block;width:100%}
.wave-divider path{transition:fill 0.6s}
.wave-animate path{
  animation:waveMorph 6s ease-in-out infinite alternate;
}
@keyframes waveMorph{
  0%{d:path("M0,60 C200,120 400,0 600,60 C800,120 1000,0 1200,60 C1400,120 1440,80 1440,80 L1440,160 L0,160 Z")}
  100%{d:path("M0,80 C200,20 400,140 600,80 C800,20 1000,120 1200,80 C1400,40 1440,100 1440,100 L1440,160 L0,160 Z")}
}

/* ══════════════════════════════
   ABOUT
══════════════════════════════ */
.about-section{
  position:relative;z-index:1;padding:8rem 3.5rem;
  background:var(--bg2);transition:background 0.6s;
}
.about-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;align-items:center}

.about-3d-wrap{
  position:relative;width:300px;height:420px;
  transform-style:preserve-3d;
  animation:aboutFloat 9s ease-in-out infinite;
  margin:0 auto;
}
@keyframes aboutFloat{
  0%,100%{transform:perspective(1000px) rotateY(-15deg) rotateX(4deg)}
  50%{transform:perspective(1000px) rotateY(-10deg) rotateX(2deg) translateY(-18px)}
}
.about-card-face{
  width:100%;height:100%;border-radius:20px;
  background:linear-gradient(145deg,var(--card-bg),var(--bg3));
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:2rem;overflow:hidden;position:relative;
  box-shadow:0 30px 80px var(--shadow),inset 0 1px 0 rgba(255,255,255,0.12);
  transition:background 0.6s,border-color 0.6s;
}
.about-initial{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Playfair Display',serif;font-size:15rem;font-weight:900;
  color:var(--rose);opacity:0.07;line-height:1;user-select:none;pointer-events:none;
}
.about-glow1{
  position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--rose-glow),transparent 70%);pointer-events:none;
}
.about-glow2{
  position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(143,166,142,0.2),transparent 70%);pointer-events:none;
}
.about-ring{
  position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;
  border:1px solid var(--glass-border);animation:ringPulse 5s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.4}50%{transform:scale(1.15);opacity:0.9}}
.about-card-name{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;font-style:italic;
  background:linear-gradient(90deg,var(--ink),var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;z-index:1;
}
.about-card-role{
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);
  margin-top:0.3rem;position:relative;z-index:1;
}

/* typewriter bio */
.typewriter-wrap{overflow:hidden}
.typewriter-text{
  font-size:0.97rem;line-height:1.9;color:var(--ink2);margin-bottom:1.2rem;
  border-right:2px solid var(--rose);
  animation:typewriterCursor 0.8s step-end infinite;
}
.typewriter-text.done{border-right:none;animation:none}
@keyframes typewriterCursor{50%{border-color:transparent}}

.eyebrow{
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;
  letter-spacing:0.25em;text-transform:uppercase;color:var(--rose);margin-bottom:1rem;
  display:flex;align-items:center;gap:0.7rem;
}
.eyebrow::before{content:'';width:24px;height:2px;background:linear-gradient(90deg,var(--rose),var(--gold));flex-shrink:0}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,3.5vw,3rem);font-weight:700;line-height:1.2;
  color:var(--ink);margin-bottom:1.2rem;
}
.section-title em{font-style:italic;background:linear-gradient(90deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.about-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:2rem}
.tag{
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;
  letter-spacing:0.05em;padding:0.35rem 0.9rem;border-radius:100px;
  border:1px solid var(--glass-border);color:var(--violet);
  background:var(--glass);transition:all 0.25s;cursor:pointer;
}
.tag:hover{background:var(--violet);color:white;border-color:var(--violet);transform:translateY(-2px)}
.social-btn{
  display:inline-flex;align-items:center;gap:0.6rem;
  padding:0.75rem 1.5rem;border-radius:100px;
  border:1px solid var(--rose-glow);background:var(--rose-glow);
  color:var(--rose);font-family:'Space Grotesk',sans-serif;
  font-size:0.8rem;font-weight:700;letter-spacing:0.05em;
  text-decoration:none;transition:all 0.3s;cursor:pointer;
}
.social-btn:hover{background:var(--rose);color:white;box-shadow:0 0 24px var(--rose-glow);transform:translateY(-2px)}
.insta-icon{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8}

/* ══════════════════════════════
   BLOGS — HORIZONTAL SCROLL
══════════════════════════════ */
.blogs-section{
  position:relative;z-index:1;padding:8rem 0;
  background:var(--bg);transition:background 0.6s;
}
.blogs-inner{max-width:1200px;margin:0 auto;padding:0 3.5rem}
.blogs-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:3rem;flex-wrap:wrap;gap:1rem;
}
.blogs-header .section-title{margin-bottom:0}
.view-all{
  font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);
  text-decoration:none;display:flex;align-items:center;gap:0.4rem;
  transition:gap 0.3s;white-space:nowrap;cursor:pointer;
}
.view-all:hover{gap:0.9rem}

/* horizontal drag scroll */
.h-scroll-track{
  display:flex;gap:1.5rem;
  overflow-x:auto;padding:1rem 3.5rem 2rem;
  scroll-snap-type:x mandatory;
  cursor:grab;
  scrollbar-width:none;
  -ms-overflow-style:none;
  -webkit-overflow-scrolling:touch;
}
.h-scroll-track::-webkit-scrollbar{display:none}
.h-scroll-track.dragging{cursor:grabbing}
.h-scroll-track.dragging .blog-card{pointer-events:none}

.blog-card{
  flex-shrink:0;
  width:340px;
  background:var(--card-bg);
  border:1px solid var(--glass-border);
  border-radius:20px;padding:0;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.4s ease,box-shadow 0.4s ease,border-color 0.4s;
  transform-style:preserve-3d;
  backdrop-filter:blur(10px);
  scroll-snap-align:start;
  display:flex;flex-direction:column;
}
.blog-card-img{
  width:100%;height:180px;position:relative;overflow:hidden;
  border-radius:20px 20px 0 0;
}
.blog-card-img-inner{
  width:100%;height:100%;transition:transform 0.6s ease;
  display:flex;align-items:center;justify-content:center;
}
.blog-card:hover .blog-card-img-inner{transform:scale(1.08)}
.blog-card-body{padding:1.8rem;flex:1;display:flex;flex-direction:column}
.card-shine{
  position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.05) 50%,transparent 60%);
  pointer-events:none;
}
.blog-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 30px 60px var(--shadow),0 0 0 1px var(--rose-glow);
  border-color:var(--rose-glow);
}
.blog-num{
  font-family:'Playfair Display',serif;font-size:5rem;font-weight:900;
  color:rgba(255,255,255,0.15);position:absolute;top:1rem;right:1.2rem;line-height:1;
}
.blog-meta{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.9rem;flex-wrap:wrap}
.blog-cat{
  font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);
  border:1px solid rgba(212,168,83,0.3);padding:0.18rem 0.6rem;border-radius:100px;
  background:rgba(212,168,83,0.08);
}
.blog-date{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;color:var(--ink3);letter-spacing:0.04em}
.blog-title{
  font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;
  line-height:1.35;color:var(--ink);margin-bottom:0.8rem;transition:color 0.3s;flex:1;
}
.blog-card:hover .blog-title{color:var(--rose)}
.blog-excerpt{
  font-size:0.87rem;line-height:1.7;color:var(--ink2);margin-bottom:1.2rem;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.read-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-family:'Space Grotesk',sans-serif;font-size:0.72rem;
  font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--rose);background:none;border:none;cursor:pointer;
  padding:0;transition:gap 0.3s,color 0.3s;align-self:flex-start;
}
.read-btn:hover{gap:0.9rem;color:var(--gold)}

/* scroll hint */
.scroll-hint{
  display:flex;align-items:center;gap:0.5rem;padding:0 3.5rem;margin-top:0.5rem;
  font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);
}
.scroll-hint-arrow{animation:nudge 2s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

/* cover gradients for cards */
.cover-0{background:linear-gradient(135deg,#e8b4bc,#c4788a,#9b6080)}
.cover-1{background:linear-gradient(135deg,#b8c9b8,#8fa68e,#6a8a6a)}
.cover-2{background:linear-gradient(135deg,#e8d4a0,#d4a853,#b88a3a)}

/* ══════════════════════════════
   CONTACT
══════════════════════════════ */
.contact-section{
  position:relative;z-index:1;padding:8rem 3.5rem;
  background:var(--bg2);text-align:center;overflow:hidden;transition:background 0.6s;
}
.contact-orb{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,var(--rose-glow),transparent 70%);pointer-events:none;
}
.contact-inner{max-width:560px;margin:0 auto;position:relative;z-index:1}
.contact-section .eyebrow{justify-content:center}
.contact-section .eyebrow::before{display:none}
.contact-desc{font-size:1rem;line-height:1.8;color:var(--ink2);margin:1.2rem 0 2.2rem}
.insta-btn{
  display:inline-flex;align-items:center;gap:0.8rem;
  padding:1rem 2.5rem;border-radius:100px;
  background:var(--rose-glow);border:1px solid var(--rose-glow);
  color:var(--ink);font-family:'Space Grotesk',sans-serif;
  font-size:0.9rem;font-weight:700;text-decoration:none;
  transition:all 0.4s;cursor:pointer;
}
.insta-btn:hover{background:linear-gradient(135deg,var(--rose),var(--violet));color:white;border-color:transparent;transform:translateY(-3px);box-shadow:0 10px 30px var(--rose-glow)}

/* ══════════════════════════════
   FOOTER
══════════════════════════════ */
footer{
  position:relative;z-index:10;background:var(--bg3);
  border-top:1px solid var(--glass-border);padding:2.5rem 3.5rem;
  transition:background 0.6s;
}
.footer-main{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1.5rem;max-width:1200px;margin:0 auto;
}
.footer-logo{
  font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.footer-links{display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
.footer-links a{
  font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);
  text-decoration:none;transition:color 0.3s;cursor:pointer;
}
.footer-links a:hover{color:var(--rose)}
.footer-copy{
  font-family:'Space Grotesk',sans-serif;font-size:0.72rem;color:var(--ink3);
  text-align:center;padding-top:1.5rem;margin-top:1.5rem;
  border-top:1px solid var(--glass-border);
  max-width:1200px;margin:1.5rem auto 0;
}

/* ══════════════════════════════
   PAGE DOTS
══════════════════════════════ */
.page-tabs{
  position:fixed;right:1.5rem;top:50%;transform:translateY(-50%);
  z-index:150;display:flex;flex-direction:column;gap:0.6rem;
}
.page-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--glass-border);cursor:pointer;transition:all 0.3s;border:none;padding:0;
}
.page-dot.active,.page-dot:hover{background:var(--rose);transform:scale(1.5);box-shadow:0 0 8px var(--rose-glow)}

/* ══════════════════════════════
   SCROLL REVEAL
══════════════════════════════ */
.reveal{opacity:0;transform:translateY(35px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-35px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(35px);transition:opacity 0.8s ease,transform 0.8s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}

/* ══════════════════════════════
   BLOG POST MODAL (page-style)
══════════════════════════════ */
.post-modal{
  position:fixed;inset:0;z-index:6000;
  background:var(--bg);overflow-y:auto;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
}

.post-modal-inner{max-width:760px;margin:0 auto;padding:6rem 2.5rem 4rem}
.post-back{

  font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);
  background:none;border:none;cursor:pointer;margin-bottom:3rem;
  transition:gap 0.3s;padding:0;
}
.post-back:hover{gap:0.9rem}
.post-cat-date{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
.post-cat{
  font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--rose);
  border:1px solid var(--rose-glow);padding:0.2rem 0.7rem;border-radius:100px;background:var(--rose-glow);
}
.post-date{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;color:var(--ink3)}
.post-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,4vw,3.2rem);font-weight:900;line-height:1.15;
  color:var(--ink);margin-bottom:1.2rem;
}
.post-lead{
  font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;line-height:1.7;
  color:var(--ink2);border-left:3px solid var(--rose);padding-left:1.2rem;margin-bottom:2.5rem;
}
.post-body{font-size:1rem;line-height:2;color:var(--ink2)}
.post-body p{margin-bottom:1.4rem}
.post-body h3{
  font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:2.2rem 0 0.9rem;
}
.post-body strong{color:var(--ink);font-weight:600}
.post-signature{
  margin-top:2.5rem;padding-top:1.8rem;border-top:1px solid var(--glass-border);
  font-family:'Playfair Display',serif;font-size:1.2rem;
  font-style:italic;color:var(--rose);text-align:right;
}

/* ── REACTIONS ── */
.reactions{
  margin-top:3rem;padding-top:2rem;border-top:1px solid var(--glass-border);
  display:flex;gap:1rem;flex-wrap:wrap;align-items:center;
}
.reactions-label{
  font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-right:0.5rem;
}
.reaction-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  padding:0.5rem 1.1rem;border-radius:100px;
  border:1px solid var(--glass-border);background:var(--glass);
  font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:600;
  color:var(--ink2);cursor:pointer;transition:all 0.3s;
}
.reaction-btn:hover,.reaction-btn.active{
  border-color:var(--rose);background:var(--rose-glow);color:var(--rose);

}
.reaction-btn.bounce{animation:reactionBounce 0.5s cubic-bezier(.34,1.56,.64,1)}
@keyframes reactionBounce{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1.08)}}
.reaction-emoji{font-size:1rem;display:inline-block;transition:transform 0.3s}
.reaction-btn:hover .reaction-emoji{transform:scale(1.25)}
.reaction-count{font-size:0.78rem;font-weight:700}

/* ══════════════════════════════
   PRIVACY MODAL
══════════════════════════════ */
.privacy-overlay{
  display:none;position:fixed;inset:0;

  backdrop-filter:blur(16px);overflow-y:auto;
}
.privacy-overlay.open{display:block}
.privacy-modal{
  max-width:800px;margin:4rem auto;
  background:var(--modal-bg);border:1px solid var(--glass-border);

}
.privacy-close{

  border:1px solid var(--glass-border);border-radius:50%;

}
.privacy-close:hover{background:var(--rose);color:white;border-color:var(--rose);transform:rotate(90deg)}
.privacy-modal h2{
  font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;
  background:linear-gradient(90deg,var(--rose),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem;
}
.priv-block{margin-bottom:2rem}
.priv-block h3{
  font-family:'Space Grotesk',sans-serif;font-size:0.82rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--violet);
  margin-bottom:0.7rem;display:flex;align-items:center;gap:0.6rem;
}
.priv-block h3::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--violet);flex-shrink:0}
.priv-block p,.priv-block li{font-size:0.93rem;line-height:1.85;color:var(--ink2)}
.priv-block ul{padding-left:1.3rem}
.priv-block li{margin-bottom:0.35rem}
.priv-block a{color:var(--violet);text-decoration:none}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media(max-width:1024px){
  nav{padding:1rem 2rem}
  .hero-content{padding:7rem 2rem 4rem;gap:3rem}
  .about-section,.contact-section{padding:6rem 2.5rem}
  .blogs-inner{padding:0 2.5rem}
  .h-scroll-track{padding:1rem 2.5rem 2rem}
  .scroll-hint{padding:0 2.5rem}
  footer{padding:2rem 2.5rem}
}
@media(max-width:768px){
  nav{padding:1rem 1.5rem}
  .nav-links{display:none}
  .hamburger{display:flex}
  .page-tabs{display:none}
  .hero-content{grid-template-columns:1fr;padding:6.5rem 1.5rem 3rem;gap:2.5rem}
  .hero-right{justify-content:center}
  .hero-3d-card{animation:none;transform:none;max-width:100%}
}
</style>
</head>
<body>

  <div class="wipe-overlay">
    <div class="wipe-panel"></div>
    <div class="wipe-panel"></div>
    <div class="wipe-panel"></div>
  </div>

  <div class="progress-bar id-bar"></div>

  <nav>
    <a href="#" class="nav-logo">AUTHENTICALLY AMNA</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#hero">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#blogs">Blogs</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button class="theme-toggle" aria-label="Toggle Theme" onclick="toggleTheme()">
        <span class="toggle-icon sun">☀️</span>
        <span class="toggle-icon moon">🌙</span>
      </button>
      <button class="hamburger" aria-label="Menu" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#hero" onclick="toggleMobileMenu()">Home</a>
    <a href="#about" onclick="toggleMobileMenu()">About</a>
    <a href="#blogs" onclick="toggleMobileMenu()">Blogs</a>
    <a href="#contact" onclick="toggleMobileMenu()">Contact</a>
  </div>

  <script>
    // Native light/dark setup interface context toggler
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const target = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', target);
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      const burger = document.querySelector('.hamburger');
      menu.classList.toggle('open');
      burger.classList.toggle('open');
    }

    // Scroll progress handler engine targeting performance safety triggers
    window.addEventListener('scroll', () => {
      const bar = document.querySelector('.progress-bar');
      const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (totalHeight > 0) {
        bar.classList.add('active');
        const progress = (window.scrollY / totalHeight) * 100;
        bar.style.width = progress + '%';
      } else {
        bar.classList.remove('active');
      }
    });

    // Instant structural mouse target links compiler preloader mapping
    document.querySelectorAll('a').forEach(link => {
      link.addEventListener('mouseenter', () => {
        const url = link.getAttribute('href');
        if (url && url.startsWith('#') && url !== '#') {
          const pre = document.createElement('link');
          pre.rel = 'prefetch';
          pre.href = url;
          document.head.appendChild(pre);
        }
      });
    });
  </script>
</body>
