<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogs by Amna — Authentically Amna</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --void:#F7F0E6;
  --deep:#EDE4D6;

  --rose:#C4788A;

  --rose-dim:#a85e72;

  --gold:#D4A853;

  --sage:#8FA68E;

  --violet:#7B5EA7;

  --violet-soft:#9b7ec8;

  --ink:#0D0F1A;

  --glass:rgba(13,15,26,0.05);

  --glass-border:rgba(13,15,26,0.12);

}



/* ── CUSTOM CURSOR ── */

body{font-family:'Inter',sans-serif;background:var(--void);color:var(--ink);overflow-x:hidden;width:100%;cursor:none}

.cursor{

  position:fixed;width:12px;height:12px;border-radius:50%;

  background:var(--rose);pointer-events:none;z-index:9999;

  transform:translate(-50%,-50%);transition:transform 0.1s,width 0.3s,height 0.3s,background 0.3s;

  mix-blend-mode:multiply;

}

.cursor-trail{

  position:fixed;width:36px;height:36px;border-radius:50%;

  border:1.5px solid var(--rose);pointer-events:none;z-index:9998;

  transform:translate(-50%,-50%);

  transition:left 0.12s ease,top 0.12s ease,width 0.3s,height 0.3s,opacity 0.3s;

  opacity:0.5;

}

.cursor-label{

  position:fixed;pointer-events:none;z-index:9999;

  font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;

  letter-spacing:0.15em;text-transform:uppercase;color:white;

  background:var(--rose);padding:0.25rem 0.6rem;border-radius:100px;

  transform:translate(10px,-50%);opacity:0;transition:opacity 0.2s;

  white-space:nowrap;

}

.cursor-label.show{opacity:1}

body.hovering-card .cursor{width:18px;height:18px;background:var(--gold)}

body.hovering-card .cursor-trail{width:50px;height:50px;border-color:var(--gold)}



/* ── READING PROGRESS ── */

#progress-bar{

  position:fixed;top:0;left:0;height:3px;width:0%;

  background:linear-gradient(90deg,var(--rose),var(--gold),var(--violet));

  z-index:9997;transition:width 0.1s linear;

  box-shadow:0 0 8px rgba(196,120,138,0.5);

}



/* ── CANVAS PARTICLES ── */

#particles{position:fixed;inset:0;z-index:0;pointer-events:none}



/* ── NAV ── */

nav{

  position:fixed;top:0;left:0;right:0;z-index:500;

  display:flex;align-items:center;justify-content:space-between;

  padding:1rem 3.5rem;

  background:rgba(247,240,230,0.88);

  backdrop-filter:blur(20px);

  border-bottom:1px solid var(--glass-border);

  transition:padding 0.3s;

}

nav.scrolled{padding:0.7rem 3.5rem;background:rgba(247,240,230,0.96)}

.nav-logo{

  font-family:'Playfair Display',serif;

  font-size:1.3rem;font-weight:900;

  background:linear-gradient(90deg,var(--rose),var(--gold));

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;

  text-decoration:none;white-space:nowrap;cursor:none;

}

.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}

.nav-links a{

  font-family:'Space Grotesk',sans-serif;

  font-size:0.78rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;

  color:rgba(13,15,26,0.6);text-decoration:none;position:relative;

  transition:color 0.3s;cursor:none;

}

.nav-links a:hover{color:var(--rose)}

.nav-links a::after{

  content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;

  background:var(--rose);transform:scaleX(0);transform-origin:left;transition:transform 0.3s;

}

.nav-links a:hover::after{transform:scaleX(1)}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:none;background:none;border:none;padding:4px}

.hamburger span{display:block;width:24px;height:2px;background:var(--ink);transition:all 0.3s}

.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}

.hamburger.open span:nth-child(2){opacity:0}

.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.mobile-menu{

  display:none;position:fixed;top:57px;left:0;right:0;

  background:rgba(247,240,230,0.97);backdrop-filter:blur(20px);

  z-index:499;flex-direction:column;padding:1.5rem 2rem 2rem;

  border-bottom:1px solid var(--glass-border);gap:1.2rem;

}

.mobile-menu.open{display:flex}

.mobile-menu a{

  font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:500;

  letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);

  text-decoration:none;padding:0.5rem 0;border-bottom:1px solid var(--glass-border);transition:color 0.3s;

}

.mobile-menu a:hover{color:var(--rose)}



/* ── DARK/LIGHT TOGGLE ── */

.theme-toggle{

  width:44px;height:24px;border-radius:100px;

  background:rgba(13,15,26,0.12);border:1px solid var(--glass-border);

  cursor:none;position:relative;transition:background 0.3s;flex-shrink:0;

}

.theme-toggle::after{

  content:'☀️';position:absolute;top:2px;left:2px;

  width:18px;height:18px;border-radius:50%;

  font-size:11px;display:flex;align-items:center;justify-content:center;

  background:white;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);

  box-shadow:0 1px 4px rgba(0,0,0,0.15);

}

body.dark .theme-toggle::after{transform:translateX(20px);content:'🌙'}

/* ink flood for theme transition */

.ink-flood{

  position:fixed;inset:0;z-index:8000;pointer-events:none;

  border-radius:50%;transform:scale(0);

  background:radial-gradient(circle,#0D0F1A 0%,#0D0F1A 100%);

  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1),opacity 0.3s;

  opacity:0;transform-origin:top right;

}

.ink-flood.flooding{transform:scale(4);opacity:1}

.ink-flood.done{transform:scale(4);opacity:0}



/* DARK MODE overrides */

body.dark{background:#0D0F1A;color:#F7F0E6}

body.dark nav{background:rgba(13,15,26,0.9)}

body.dark .mobile-menu{background:rgba(13,15,26,0.97)}

body.dark .nav-links a{color:rgba(247,240,230,0.6)}

body.dark .hamburger span{background:#F7F0E6}

body.dark .mobile-menu a{color:#F7F0E6;border-color:rgba(247,240,230,0.1)}

body.dark .hero-title .line1{color:#F7F0E6}

body.dark .hero-sub{color:rgba(247,240,230,0.6)}

body.dark .hero-3d-card{box-shadow:20px 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(196,120,138,0.2)}

body.dark .card-quote{color:#F7F0E6}

body.dark .section-title{color:#F7F0E6}

body.dark .about-bio{color:rgba(247,240,230,0.65)}

body.dark .about-section{background:linear-gradient(180deg,#0D0F1A,#161929)}

body.dark .blogs-section{background:#0D0F1A}

body.dark .blog-card{background:rgba(247,240,230,0.04);border-color:rgba(247,240,230,0.1)}

body.dark .blog-card.featured{background:linear-gradient(to top,rgba(22,25,41,0.99) 40%,rgba(196,120,138,0.1) 100%)}

body.dark .blog-title{color:#F7F0E6}

body.dark .blog-excerpt{color:rgba(247,240,230,0.45)}

body.dark .blog-date{color:rgba(247,240,230,0.3)}

body.dark .contact-section{background:linear-gradient(180deg,#0D0F1A,#161929)}

body.dark .contact-desc{color:rgba(247,240,230,0.5)}

body.dark footer{background:#0a0b12}

body.dark .footer-links a{color:rgba(247,240,230,0.4)}

body.dark .footer-copy{color:rgba(247,240,230,0.25)}

body.dark .theme-toggle{background:rgba(247,240,230,0.1)}

body.dark .glass-border{border-color:rgba(247,240,230,0.08)}

body.dark .page-dot{background:rgba(247,240,230,0.2)}

body.dark .about-card-face{background:linear-gradient(145deg,rgba(123,94,167,0.2),rgba(196,120,138,0.12));border-color:rgba(123,94,167,0.3)}

body.dark .tag{color:var(--violet-soft)}

body.dark .modal-content{background:linear-gradient(145deg,#161929,#0D0F1A);border-color:rgba(196,120,138,0.2)}

body.dark .privacy-modal{background:linear-gradient(145deg,#161929,#0D0F1A);border-color:rgba(123,94,167,0.2)}

body.dark .post-title,.dark .post-body strong{color:#F7F0E6}

body.dark .post-lead,.dark .post-body{color:rgba(247,240,230,0.7)}

body.dark .post-body h3{color:#F7F0E6}

body.dark .priv-block p,.dark .priv-block li{color:rgba(247,240,230,0.65)}

body.dark .privacy-modal h2{background:linear-gradient(90deg,var(--rose),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

body.dark .modal-close{color:#F7F0E6}

body.dark .grid-lines{background-image:linear-gradient(rgba(196,120,138,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(196,120,138,0.06) 1px,transparent 1px)}



/* ── HERO ── */

.hero{

  position:relative;min-height:100vh;width:100%;

  display:flex;align-items:center;justify-content:center;

  overflow:hidden;z-index:1;

}

.hero-orb{

  position:absolute;width:700px;height:700px;border-radius:50%;

  background:conic-gradient(from 0deg,var(--violet),var(--rose),var(--gold),var(--sage),var(--violet));

  filter:blur(90px);opacity:0.15;animation:orbSpin 22s linear infinite;pointer-events:none;

}

@keyframes orbSpin{from{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)}to{transform:rotate(360deg) scale(1)}}

.grid-lines{

  position:absolute;inset:0;

  background-image:linear-gradient(rgba(196,120,138,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(196,120,138,0.06) 1px,transparent 1px);

  background-size:60px 60px;

  transform:perspective(800px) rotateX(20deg);transform-origin:bottom;pointer-events:none;

}

.hero-content{

  position:relative;z-index:2;

  display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;

  max-width:1200px;width:100%;padding:7rem 3rem 4rem;

}

.hero-left{position:relative}

.hero-badge{

  display:inline-flex;align-items:center;gap:0.5rem;padding:0.4rem 1rem;

  border:1px solid rgba(196,120,138,0.35);border-radius:100px;

  font-family:'Space Grotesk',sans-serif;font-size:0.68rem;font-weight:600;

  letter-spacing:0.15em;text-transform:uppercase;color:var(--rose);

  margin-bottom:1.5rem;background:rgba(196,120,138,0.08);

  opacity:0;animation:fadeUp 0.8s ease 0.1s forwards;

}

.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--rose);animation:pulse 2s infinite}

@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(196,120,138,0.5)}50%{opacity:0.7;box-shadow:0 0 0 7px rgba(196,120,138,0)}}



/* INK BLEED TITLE */

.hero-title{

  font-family:'Playfair Display',serif;

  font-size:clamp(3rem,5.5vw,5.8rem);font-weight:900;line-height:1;

}

.hero-title .line1{display:block;color:var(--ink)}

.hero-title .line2{

  display:block;font-style:italic;font-weight:400;

  background:linear-gradient(90deg,var(--rose) 0%,var(--gold) 50%,var(--violet) 100%);

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;

  background-size:200% auto;animation:gradientShift 5s linear infinite;

}

@keyframes gradientShift{0%{background-position:0% center}100%{background-position:200% center}}



/* Ink bleed letter animation */

.ink-letter{

  display:inline-block;opacity:0;

  animation:inkBleed 0.6s cubic-bezier(0.22,1,0.36,1) forwards;

  filter:blur(8px);transform:scale(1.3);

}

@keyframes inkBleed{

  0%{opacity:0;filter:blur(12px);transform:scale(1.4)}

  60%{opacity:1;filter:blur(2px);transform:scale(1.02)}

  100%{opacity:1;filter:blur(0);transform:scale(1)}

}



.hero-sub{

  margin-top:1.5rem;font-size:1.05rem;line-height:1.8;

  color:rgba(13,15,26,0.6);max-width:440px;

  opacity:0;animation:fadeUp 0.8s ease 1.4s forwards;

}

.hero-cta{

  margin-top:2.5rem;display:flex;gap:1rem;flex-wrap:wrap;

  opacity:0;animation:fadeUp 0.8s ease 1.6s forwards;

}

.btn-glow{

  display:inline-flex;align-items:center;gap:0.5rem;padding:0.9rem 2rem;

  border:none;cursor:none;font-family:'Space Grotesk',sans-serif;font-size:0.82rem;

  font-weight:600;letter-spacing:0.06em;text-transform:uppercase;

  text-decoration:none;border-radius:4px;

  background:linear-gradient(135deg,var(--rose),var(--violet));color:white;

  position:relative;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;

  box-shadow:0 4px 24px rgba(196,120,138,0.3);

}

.btn-glow::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gold),var(--rose));opacity:0;transition:opacity 0.3s}

.btn-glow:hover{transform:translateY(-3px);box-shadow:0 8px 40px rgba(196,120,138,0.45)}

.btn-glow:hover::before{opacity:1}

.btn-glow span{position:relative;z-index:1}

.btn-outline{

  display:inline-flex;align-items:center;gap:0.5rem;padding:0.9rem 2rem;

  border:1px solid var(--glass-border);cursor:none;

  font-family:'Space Grotesk',sans-serif;font-size:0.82rem;font-weight:600;

  letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;

  border-radius:4px;color:var(--ink);background:var(--glass);transition:all 0.3s;

}

.btn-outline:hover{border-color:var(--rose);color:var(--rose);box-shadow:0 4px 20px rgba(196,120,138,0.15)}



/* 3D floating hero card */

.hero-right{display:flex;justify-content:center;align-items:center;opacity:0;animation:fadeUp 0.8s ease 1.8s forwards}

.hero-3d-card{

  width:100%;max-width:360px;

  background:rgba(247,240,230,0.7);

  border:1px solid var(--glass-border);border-radius:20px;padding:2.5rem;

  backdrop-filter:blur(20px);

  animation:float3d 6s ease-in-out infinite;

  position:relative;overflow:hidden;

  box-shadow:0 0 0 1px rgba(196,120,138,0.15),20px 20px 50px rgba(13,15,26,0.12),inset 0 1px 0 rgba(255,255,255,0.6);

}

.hero-3d-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(196,120,138,0.06),rgba(123,94,167,0.05));pointer-events:none}

@keyframes float3d{

  0%,100%{transform:perspective(800px) rotateY(-8deg) rotateX(4deg) translateY(0)}

  33%{transform:perspective(800px) rotateY(-5deg) rotateX(2deg) translateY(-12px)}

  66%{transform:perspective(800px) rotateY(-10deg) rotateX(6deg) translateY(-6px)}

}

.card-tag{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--rose);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}

.card-tag::before{content:'';width:20px;height:1px;background:var(--rose)}

.card-quote{font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;font-weight:400;line-height:1.65;color:var(--ink);margin-bottom:1.5rem;position:relative;z-index:1}

.card-author{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.1em;color:var(--gold);text-transform:uppercase}

.card-glow{position:absolute;bottom:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(196,120,138,0.18),transparent 70%);pointer-events:none}



/* ── MARQUEE ── */

.marquee-wrap{

  position:relative;z-index:10;overflow:hidden;padding:0.8rem 0;

  background:linear-gradient(90deg,var(--rose),var(--violet),var(--gold),var(--rose));

  background-size:300% auto;animation:gradientShift 8s linear infinite;

}

.marquee-track{display:flex;white-space:nowrap;animation:marquee 30s linear infinite}

.marquee-item{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:white;padding:0 1.5rem;flex-shrink:0}

.marquee-sep{color:rgba(255,255,255,0.45);padding:0 0.3rem;flex-shrink:0}

@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}



/* ── WAVE DIVIDER ── */

.wave-divider{position:relative;z-index:5;overflow:hidden;line-height:0;margin-top:-2px}

.wave-divider svg{display:block;width:100%;height:60px}

.wave-divider.flip{transform:scaleY(-1)}



/* ── ABOUT ── */

.about-section{

  position:relative;z-index:1;padding:8rem 3.5rem;

  background:linear-gradient(180deg,var(--void) 0%,var(--deep) 100%);

}

.about-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;align-items:center}

.about-visual{display:flex;justify-content:center}

.about-3d-wrap{position:relative;width:300px;height:420px;transform-style:preserve-3d;animation:aboutFloat 8s ease-in-out infinite}

@keyframes aboutFloat{

  0%,100%{transform:perspective(1000px) rotateY(-15deg) rotateX(5deg)}

  50%{transform:perspective(1000px) rotateY(-10deg) rotateX(2deg) translateY(-15px)}

}

.about-card-face{

  width:100%;height:100%;border-radius:20px;

  background:linear-gradient(145deg,rgba(123,94,167,0.12),rgba(196,120,138,0.08));

  border:1px solid rgba(196,120,138,0.2);backdrop-filter:blur(20px);

  display:flex;flex-direction:column;justify-content:flex-end;

  padding:2rem;overflow:hidden;position:relative;

  box-shadow:0 30px 80px rgba(13,15,26,0.15),inset 0 1px 0 rgba(255,255,255,0.5);

}

.about-initial{

  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);

  font-family:'Playfair Display',serif;font-size:14rem;font-weight:900;

  background:linear-gradient(135deg,rgba(196,120,138,0.15),rgba(123,94,167,0.08));

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;

  line-height:1;user-select:none;pointer-events:none;

}

.about-glow-orb{position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(196,120,138,0.2),transparent 70%);pointer-events:none}

.about-glow-orb2{position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(143,166,142,0.15),transparent 70%);pointer-events:none}

.about-card-name{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;font-style:italic;background:linear-gradient(90deg,var(--ink),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}

.about-card-role{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-top:0.3rem;position:relative;z-index:1}

.about-ring{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;border:1px solid rgba(212,168,83,0.25);animation:ringPulse 4s ease-in-out infinite}

.about-ring::before{content:'';position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(212,168,83,0.12)}

@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.1);opacity:1}}



/* TYPEWRITER */

.typewriter-wrap{min-height:5.5rem}

.typewriter{border-right:2px solid var(--rose);padding-right:3px;animation:blink 0.75s step-end infinite}

@keyframes blink{0%,100%{border-color:var(--rose)}50%{border-color:transparent}}



.eyebrow{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--rose);margin-bottom:1rem;display:flex;align-items:center;gap:0.7rem}

.eyebrow::before{content:'';width:24px;height:2px;background:linear-gradient(90deg,var(--rose),var(--gold));flex-shrink:0}

.section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,3rem);font-weight:700;line-height:1.2;color:var(--ink);margin-bottom:1.2rem}

.section-title em{font-style:italic;background:linear-gradient(90deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.about-bio{font-size:0.97rem;line-height:1.9;color:rgba(13,15,26,0.65);margin-bottom:1.2rem}

.about-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:2rem}

.tag{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;padding:0.35rem 0.9rem;border-radius:100px;border:1px solid rgba(123,94,167,0.3);color:var(--violet);background:rgba(123,94,167,0.06);transition:all 0.25s;cursor:none}

.tag:hover{background:var(--violet);color:white}

.social-btn{display:inline-flex;align-items:center;gap:0.6rem;padding:0.75rem 1.5rem;border-radius:100px;border:1px solid rgba(196,120,138,0.35);background:rgba(196,120,138,0.06);color:var(--rose);font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.05em;text-decoration:none;transition:all 0.3s;cursor:none}

.social-btn:hover{background:var(--rose);color:white;box-shadow:0 6px 24px rgba(196,120,138,0.3)}

.insta-icon{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8}



/* ── BLOGS ── */

.blogs-section{position:relative;z-index:1;padding:8rem 3.5rem;background:var(--void)}

.blogs-inner{max-width:1200px;margin:0 auto}

.blogs-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4rem;flex-wrap:wrap;gap:1rem}

.blogs-header .section-title{margin-bottom:0}

.view-all{font-family:'Space Grotesk',sans-serif;font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);text-decoration:none;display:flex;align-items:center;gap:0.4rem;transition:gap 0.3s;white-space:nowrap;cursor:none}

.view-all:hover{gap:0.9rem}



/* ── HORIZONTAL SCROLL ARCHIVE ── */

.archive-section{position:relative;z-index:1;padding:4rem 0 6rem;background:var(--deep);overflow:hidden}

.archive-label{font-family:'Space Grotesk',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--rose);padding:0 3.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:0.7rem}

.archive-label::before{content:'';width:24px;height:2px;background:linear-gradient(90deg,var(--rose),var(--gold));flex-shrink:0}

.archive-label .drag-hint{color:rgba(13,15,26,0.4);font-weight:400;letter-spacing:0.1em;margin-left:auto;font-size:0.65rem}

.h-scroll{

  display:flex;gap:1.5rem;padding:0.5rem 3.5rem 2rem;

  overflow-x:auto;cursor:grab;user-select:none;

  scrollbar-width:thin;scrollbar-color:var(--rose) transparent;

}

.h-scroll:active{cursor:grabbing}

.h-scroll::-webkit-scrollbar{height:3px}

.h-scroll::-webkit-scrollbar-thumb{background:var(--rose);border-radius:100px}

.h-scroll::-webkit-scrollbar-track{background:transparent}

.h-card{

  flex-shrink:0;width:280px;

  background:rgba(247,240,230,0.6);border:1px solid var(--glass-border);

  border-radius:16px;padding:1.8rem;cursor:none;

  position:relative;overflow:hidden;

  transition:transform 0.3s,box-shadow 0.3s;

  backdrop-filter:blur(10px);

}

.h-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(13,15,26,0.12)}

.h-card-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:rgba(196,120,138,0.12);line-height:1;margin-bottom:0.5rem}

.h-card-cat{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:0.7rem}

.h-card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;line-height:1.35;color:var(--ink);margin-bottom:0.7rem;transition:color 0.3s}

.h-card:hover .h-card-title{color:var(--rose)}

.h-card-excerpt{font-size:0.82rem;line-height:1.65;color:rgba(13,15,26,0.5);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

body.dark .h-card{background:rgba(22,25,41,0.8);border-color:rgba(247,240,230,0.08)}

body.dark .h-card-title{color:#F7F0E6}

body.dark .h-card-excerpt{color:rgba(247,240,230,0.45)}

body.dark .archive-section{background:#161929}

body.dark .archive-label .drag-hint{color:rgba(247,240,230,0.3)}



/* 3D blog grid */

.blogs-grid{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:auto auto;gap:1.5rem}

.blog-card{

  background:rgba(13,15,26,0.04);border:1px solid var(--glass-border);

  border-radius:16px;padding:2rem;cursor:none;

  position:relative;overflow:hidden;

  transition:transform 0.35s ease,box-shadow 0.35s ease,border-color 0.35s;

  transform-style:preserve-3d;backdrop-filter:blur(10px);

}

.blog-card::before{content:'';position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(196,120,138,0.05),rgba(123,94,167,0.04));opacity:0;transition:opacity 0.4s}

.blog-card:hover{box-shadow:0 24px 50px rgba(13,15,26,0.1),0 0 0 1px rgba(196,120,138,0.25),0 0 30px rgba(196,120,138,0.06);border-color:rgba(196,120,138,0.25)}

.blog-card:hover::before{opacity:1}

.blog-card.featured{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;justify-content:flex-end;min-height:480px;background:linear-gradient(to top,rgba(237,228,214,0.99) 35%,rgba(196,120,138,0.1) 100%);border-color:rgba(196,120,138,0.18)}

.blog-card.small{grid-column:2}

.card-cover{

  position:absolute;inset:0;border-radius:16px;opacity:0.07;pointer-events:none;

  background-size:cover;background-position:center;

  transition:opacity 0.4s;

}

.blog-card:hover .card-cover{opacity:0.12}

.blog-card.featured .card-cover{opacity:0.1}

.cover-culture{background:radial-gradient(ellipse at 30% 40%,var(--rose) 0%,var(--violet) 60%,transparent 100%)}

.cover-welcome{background:radial-gradient(ellipse at 70% 60%,var(--gold) 0%,var(--sage) 60%,transparent 100%)}

.blog-meta{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.9rem;flex-wrap:wrap}

.blog-cat{font-family:'Space Grotesk',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(212,168,83,0.3);padding:0.18rem 0.55rem;border-radius:100px;background:rgba(212,168,83,0.08)}

.blog-date{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;color:rgba(13,15,26,0.38);letter-spacing:0.04em}

.blog-num{margin-left:auto;font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,rgba(196,120,138,0.18),rgba(123,94,167,0.1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}

.blog-card.featured .blog-num{font-size:5rem}

.blog-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;line-height:1.35;color:var(--ink);margin-bottom:0.8rem;transition:color 0.3s}

.blog-card.featured .blog-title{font-size:1.8rem}

.blog-card:hover .blog-title{color:var(--rose)}

.blog-excerpt{font-size:0.87rem;line-height:1.7;color:rgba(13,15,26,0.5);margin-bottom:1.2rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.blog-card.featured .blog-excerpt{-webkit-line-clamp:4}

.read-btn{display:inline-flex;align-items:center;gap:0.4rem;font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--rose);background:none;border:none;cursor:none;padding:0;transition:gap 0.3s,color 0.3s}

.read-btn:hover{gap:0.9rem;color:var(--gold)}



/* ── CONTACT ── */

.contact-section{position:relative;z-index:1;padding:8rem 3.5rem;background:linear-gradient(180deg,var(--void),var(--deep));text-align:center;overflow:hidden}

.contact-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(196,120,138,0.1),transparent 70%);pointer-events:none}

.contact-inner{max-width:560px;margin:0 auto;position:relative;z-index:1}

.contact-section .eyebrow{justify-content:center}

.contact-section .eyebrow::before{display:none}

.contact-desc{font-size:1rem;line-height:1.8;color:rgba(13,15,26,0.55);margin:1.2rem 0 2.2rem}

.insta-btn{display:inline-flex;align-items:center;gap:0.8rem;padding:1rem 2.5rem;border-radius:100px;background:rgba(196,120,138,0.08);border:1px solid rgba(196,120,138,0.3);color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:600;text-decoration:none;transition:all 0.4s;cursor:none}

.insta-btn:hover{background:var(--rose);border-color:var(--rose);color:white;transform:translateY(-3px);box-shadow:0 12px 40px rgba(196,120,138,0.3)}



/* ── FOOTER ── */

footer{position:relative;z-index:10;background:var(--deep);border-top:1px solid var(--glass-border);padding:2.5rem 3.5rem}

.footer-main{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;max-width:1200px;margin:0 auto}

.footer-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.footer-links{display:flex;gap:2rem;align-items:center;flex-wrap:wrap}

.footer-links a{font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:rgba(13,15,26,0.45);text-decoration:none;transition:color 0.3s;cursor:none}

.footer-links a:hover{color:var(--rose)}

.footer-copy{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;color:rgba(13,15,26,0.32);text-align:center;margin:1.5rem auto 0;padding-top:1.5rem;border-top:1px solid var(--glass-border);max-width:1200px}



/* ── PAGE DOTS ── */

.page-tabs{position:fixed;right:1.5rem;top:50%;transform:translateY(-50%);z-index:400;display:flex;flex-direction:column;gap:0.6rem}

.page-dot{width:6px;height:6px;border-radius:50%;background:rgba(13,15,26,0.2);cursor:none;transition:all 0.3s;border:none;padding:0}

.page-dot.active,.page-dot:hover{background:var(--rose);transform:scale(1.5);box-shadow:0 0 8px rgba(196,120,138,0.5)}



/* ── ANIMATIONS ── */

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.reveal{opacity:0;transform:translateY(35px);transition:opacity 0.8s ease,transform 0.8s ease}

.reveal.visible{opacity:1;transform:translateY(0)}

.reveal-left{opacity:0;transform:translateX(-35px);transition:opacity 0.8s ease,transform 0.8s ease}

.reveal-left.visible{opacity:1;transform:translateX(0)}

.reveal-right{opacity:0;transform:translateX(35px);transition:opacity 0.8s ease,transform 0.8s ease}

.reveal-right.visible{opacity:1;transform:translateX(0)}



/* ── PAGE TRANSITION WIPE ── */

.page-wipe{

  position:fixed;inset:0;z-index:2000;pointer-events:none;

  display:flex;align-items:center;justify-content:center;

}

.wipe-panel{

  position:absolute;inset:0;

  background:linear-gradient(135deg,var(--rose),var(--violet));

  transform:translateX(-100%);

  transition:transform 0.5s cubic-bezier(0.76,0,0.24,1);

}

.page-wipe.entering .wipe-panel{transform:translateX(0)}

.page-wipe.exiting .wipe-panel{transform:translateX(100%)}



/* ── MODAL (blog post - full page feel) ── */

.modal-overlay{

  display:none;position:fixed;inset:0;z-index:600;

  background:rgba(247,240,230,0.97);backdrop-filter:blur(4px);

  overflow-y:auto;opacity:0;

  transition:opacity 0.4s ease;

}

.modal-overlay.open{display:block}

.modal-overlay.visible{opacity:1}

.modal-content{

  max-width:760px;margin:0 auto;

  padding:5rem 3.5rem 6rem;position:relative;

  transform:translateY(30px);transition:transform 0.5s cubic-bezier(0.22,1,0.36,1);

}

.modal-overlay.visible .modal-content{transform:translateY(0)}

.modal-close{

  position:fixed;top:1.5rem;right:2rem;

  width:42px;height:42px;

  background:var(--rose);border:none;border-radius:50%;

  cursor:none;font-size:1rem;color:white;

  display:flex;align-items:center;justify-content:center;

  transition:all 0.3s;z-index:10;

  box-shadow:0 4px 16px rgba(196,120,138,0.35);

}

.modal-close:hover{transform:rotate(90deg) scale(1.1);background:var(--rose-dim)}



/* reading progress inside post */

#post-progress{position:fixed;top:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--rose),var(--gold),var(--violet));z-index:700;transition:width 0.1s linear}



.post-cat-date{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}

.post-cat{font-family:'Space Grotesk',sans-serif;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--rose);border:1px solid rgba(196,120,138,0.3);padding:0.2rem 0.7rem;border-radius:100px;background:rgba(196,120,138,0.06)}

.post-date{font-family:'Space Grotesk',sans-serif;font-size:0.72rem;color:rgba(13,15,26,0.38)}

.post-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;line-height:1.1;color:var(--ink);margin-bottom:1.5rem}

.post-lead{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;line-height:1.75;color:rgba(13,15,26,0.55);border-left:3px solid var(--rose);padding-left:1.3rem;margin-bottom:2.5rem}

.post-body{font-size:1rem;line-height:2;color:rgba(13,15,26,0.75)}

.post-body p{margin-bottom:1.5rem}

.post-body h3{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--ink);margin:2.5rem 0 1rem;background:linear-gradient(90deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.post-body strong{color:var(--ink)}

.post-signature{margin-top:2.5rem;padding-top:1.8rem;border-top:1px solid var(--glass-border);font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;color:var(--rose);text-align:right}
